version: '3.5'

services:
  # ========== Milvus 依赖：etcd ==========
  etcd:
    container_name: milvus-etcd
    platform: linux/amd64
    image: milvusdb/etcd:3.5.5-r2
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
      - ETCD_DATA_DIR=/etcd                          # 用环境变量代替命令行 --data-dir
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379  # 用环境变量代替 -listen-client-urls
      - ETCD_ADVERTISE_CLIENT_URLS=http://127.0.0.1:2379  # 用环境变量代替 -advertise-client-urls
      - ALLOW_NONE_AUTHENTICATION=yes                # bitnami 镜像要求
    volumes:
      - etcd_data:/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

  # ========== Milvus 依赖：MinIO ==========
  minio:
    container_name: milvus-minio
    platform: linux/amd64          # Apple Silicon Mac 兼容
    image: minio/minio:RELEASE.2024-04-18T19-09-19Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "9001:9001"
      - "9000:9000"
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

  # ========== Milvus Standalone ==========
  milvus:
    container_name: milvus-standalone
    platform: linux/amd64          # Apple Silicon Mac 兼容
    image: milvusdb/milvus:v2.3.14
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

volumes:
  etcd_data:
    driver: local
  minio_data:
    driver: local
  milvus_data:
    driver: local